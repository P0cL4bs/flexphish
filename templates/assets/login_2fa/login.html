<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login – log in or sign up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {{ if .Hooks }}
    {{ range .Hooks }}
    <script src="{{ . }}"></script>
    {{end}}
    {{end}}

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-sm p-4" style="min-width: 320px; max-width: 400px; width: 100%;">
            <h2 class="text-center mb-4">Login</h2>
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" method="POST" action="/login">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Email or phone" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Log In</button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS for error handling -->
    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new URLSearchParams();
            for (const [key, value] of new FormData(form)) {
                formData.append(key, value);
            }

            const response = await fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
            });

            const data = await response.json();

            if (data.redirect) {
                window.location.href = data.redirect;
                return;
            }

            if (!data.success) {

                errorDiv.textContent = data.error || "Login failed.";
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
    <script src="/static/script.js"></script>
</body>

</html>
