<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login – Verify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-sm p-4" style="min-width: 320px; max-width: 400px; width: 100%;">
            <h2 class="text-center mb-4">Two-Factor Verification</h2>

            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

            <form id="verify-form" method="POST" action="/verify">
                <div class="mb-3">
                    <input type="text" name="sms_code" class="form-control" placeholder="Enter 6-digit code" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS for error handling -->
    <script>
        const form = document.getElementById('verify-form');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new URLSearchParams();
            for (const [key, value] of new FormData(form)) {
                formData.append(key, value);
            }

            const response = await fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
            });
            const data = await response.json();

            if (data.redirect) {
                window.location.href = data.redirect;
                return;
            }

            if (!data.success) {

                errorDiv.textContent = data.error || 'Verification failed.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
    <script src="/static/script.js"></script>
</body>
