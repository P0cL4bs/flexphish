<header class="navbar mb-0 border-b border-base-300">
  <div class="navbar-start flex items-center space-x-3">
    <button class="btn btn-sm btn-ghost" aria-label="Toggle Sidebar" (click)="toggleSidebar()">
      <lucide-icon [name]="sidebarService.isHide() ? 'square-chevron-left' : 'square-chevron-right'" class="w-5 h-5">
      </lucide-icon>
    </button>
    <div class="flex flex-col leading-tight">
      <div class="flex items-center space-x-1">
        <h1 class="text-primary sm:text-4xl md:text-xl font-bold text-lg select-none">Flexphish</h1>
        <span class="text-secondary font-semibold select-none">UI</span>
      </div>
      <span class="text-xs text-base-content/60 select-none"><strong>v{{ env.version }}</strong> </span>
    </div>
  </div>
  <div class="navbar-end m-2">
    <div class="dropdown dropdown-end mr-2" [class.dropdown-open]="isNotificationsOpen" data-notification-dropdown>
      <button tabindex="0" class="btn btn-soft btn-sm p-2 relative" aria-label="Open notifications"
        (click)="toggleNotifications($event)">
        <lucide-icon size="16" name="bell"></lucide-icon>
        <span *ngIf="notificationCount > 0"
          class="badge badge-primary badge-sm absolute -top-2 -right-2 min-w-5 h-5 px-1 rounded-full">
          {{ notificationCount > 99 ? '99+' : notificationCount }}
        </span>
      </button>

      <div tabindex="0" (click)="keepNotificationsOpen($event)"
        class="dropdown-content z-[120] mt-2 w-[22rem] rounded-box border border-base-300 bg-base-100 shadow-xl">
        <div class="flex items-center justify-between border-b border-base-300 px-4 py-3">
          <div class="font-semibold">Notifications</div>
          <button class="btn btn-ghost btn-xs" [disabled]="notificationCount === 0" (click)="clearNotifications()">
            Clear all
          </button>
        </div>

        <div class="max-h-80 overflow-y-auto">
          <div *ngIf="notificationCount === 0" class="px-4 py-8 text-center text-sm text-base-content/60">
            No notifications yet.
          </div>

          <div *ngFor="let notification of notifications" class="px-4 py-3 border-b border-base-200/70">
            <div class="flex items-start justify-between gap-3">
              <div class="text-sm leading-5 text-base-content">
                {{ notification.text }}
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <span class="badge badge-soft badge-xs" [ngClass]="getNotificationBadgeClass(notification.type)">
                  {{ notification.type }}
                </span>
                <button class="btn btn-ghost btn-xs btn-square" aria-label="Remove notification"
                  (click)="removeNotification(notification.id); $event.stopPropagation(); $event.preventDefault()">
                  <lucide-icon size="14" name="x"></lucide-icon>
                </button>
              </div>
            </div>
            <div class="mt-2 text-xs text-base-content/60">
              {{ formatNotificationTime(notification.timestamp) }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tooltip tooltip-left" *ngIf="!isVisibleCommandBar" data-tip="Show command bar"
      (click)="toggleCommandBar()">
      <button class="btn btn-soft btn-sm p-2">
        <lucide-icon size="16" name="panel-top-open"></lucide-icon>
      </button>
    </div>
    <a class="btn"><lucide-icon name="log-out" (click)="logout()"></lucide-icon></a>
  </div>
</header>
