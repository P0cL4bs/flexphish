name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - GOOS: linux
            GOARCH: amd64
            RUNNER: ubuntu-latest
            CC: gcc
          - GOOS: windows
            GOARCH: amd64
            RUNNER: ubuntu-latest
            CC: x86_64-w64-mingw32-gcc

    runs-on: ${{ matrix.RUNNER }}
    env:
      CGO_ENABLED: 1
      PROJECT_NAME: flexphish

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Install system dependencies (make + zip + mingw)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full build-essential zip gcc-mingw-w64-x86-64

      - name: 🧰 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: 🧱 Setup Node + pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📦 Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⬆️ Install compatible pnpm version
        run: |
          corepack enable
          corepack prepare pnpm@10.8.0 --activate

      - name: 📂 Install frontend dependencies
        run: |
          cd app
          pnpm install

      - name: 🔨 Build Go binary
        env:
          CC: ${{ matrix.CC }}
        run: |
          make all GOOS=${{ matrix.GOOS }} GOARCH=${{ matrix.GOARCH }} PLATFORMS=${{ matrix.GOOS }}/${{ matrix.GOARCH }}

      - name: ✅ Validate generated package
        shell: bash
        run: |
          set -euo pipefail
          command -v "${{ matrix.CC }}" >/dev/null
          ZIP_FILE="$(ls -1 build/*_${{ matrix.GOOS }}_${{ matrix.GOARCH }}*.zip | head -n 1)"
          if [ -z "${ZIP_FILE:-}" ]; then
            echo "No zip generated for ${{ matrix.GOOS }}/${{ matrix.GOARCH }}"
            exit 1
          fi
          if [ "${{ matrix.GOOS }}" = "windows" ]; then
            unzip -l "$ZIP_FILE" | grep -q "flexphish.exe"
          else
            unzip -l "$ZIP_FILE" | grep -q "flexphish$"
          fi
